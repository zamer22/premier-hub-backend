name: Build and Deploy Backend (prod)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t premier-api:${{ github.sha }} -t premier-api:latest ./api
          docker save premier-api:${{ github.sha }} | sudo k3s ctr images import -

      - name: Deploy to K3s
        run: |
          kubectl apply -f https://raw.githubusercontent.com/zamer22/premier-hub-infra/main/k8s/prod/api-deployment.yaml
          kubectl apply -f https://raw.githubusercontent.com/zamer22/premier-hub-infra/main/k8s/prod/api-service.yaml
          kubectl set image deployment/api api=premier-api:${{ github.sha }} -n prod
          kubectl rollout status deployment/api -n prod --timeout=120s

      - name: Update versions.env
        run: |
          cd /home/zamer/premier-hub-infra
          git pull --rebase origin main
          sed -i 's/^PROD_BACKEND_TAG=.*/PROD_BACKEND_TAG=${{ github.sha }}/' versions.env
          git add versions.env
          git commit -m "deploy: backend prod → ${{ github.sha }}" || true
          git push origin HEAD:main
