name: Build and Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t premier-api:latest ./api
          docker save premier-api:latest | sudo k3s ctr images import -

      - name: Deploy to K3s
        run: |
          kubectl apply -f https://raw.githubusercontent.com/zamer22/premier-hub-infra/main/k8s/prod/api-deployment.yaml
          kubectl apply -f https://raw.githubusercontent.com/zamer22/premier-hub-infra/main/k8s/prod/api-service.yaml
          kubectl rollout restart deployment/api -n prod
          kubectl rollout status deployment/api -n prod --timeout=120s
